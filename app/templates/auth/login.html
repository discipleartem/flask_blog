{% extends "base.html" %}

{% block title %}Вход - Flask Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0">
                    <i class="fas fa-sign-in-alt me-2"></i>Вход
                </h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                </div>
                {% endif %}
                
                <form method="POST">
                    <!-- TODO: Добавить CSRF токен после реализации сервиса
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    -->
                    <div class="mb-3">
                        <label for="login" class="form-label">Логин</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" 
                                   class="form-control" 
                                   id="login" 
                                   name="login" 
                                   value="{{ login or '' }}"
                                   placeholder="Введите логин"
                                   required
                                   maxlength="50"
                                   autocomplete="username">
                        </div>
                        <div class="form-text">
                            Введите логин и пароль. Система автоматически определит ваш аккаунт.
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" 
                                   class="form-control" 
                                   id="password" 
                                   name="password" 
                                   placeholder="Введите пароль"
                                   required
                                   autocomplete="current-password">
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" 
                               class="form-check-input" 
                               id="remember_me" 
                               name="remember_me">
                        <label class="form-check-label" for="remember_me">
                            Запомнить меня на 30 дней
                        </label>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-2"></i>Войти
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <small class="text-muted">
                    Нет аккаунта? 
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Зарегистрируйтесь</a>
                </small>
            </div>
        </div>
    </div>
</div>

<script>
// Можно добавить JavaScript для улучшения UX в будущем
</script>
{% endblock %}
