{% extends "base.html" %}

{% block title %}Выбор аккаунта - Flask Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0">
                    <i class="fas fa-users me-2"></i>Выберите аккаунт
                </h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                </div>
                {% endif %}
                
                <p class="text-center mb-4">
                    Найдено несколько аккаунтов с логином <strong>{{ login }}</strong>. Выберите нужный:
                </p>
                
                <div class="list-group">
                    {% for account in accounts %}
                    <form method="POST" action="{{ url_for('auth.select_account') }}">
                        <input type="hidden" name="user_id" value="{{ account.user_id }}">
                        <button type="submit" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">
                                    <i class="fas fa-user me-2"></i>{{ account.full_login }}
                                </h5>
                                <small class="text-muted">ID: {{ account.user_id }}</small>
                            </div>
                            <i class="fas fa-chevron-right text-muted"></i>
                        </button>
                    </form>
                    {% endfor %}
                </div>
                
                <div class="mt-4 text-center">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Назад
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
