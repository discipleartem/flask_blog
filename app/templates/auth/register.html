{% extends "base.html" %}

{% block title %}Регистрация - Flask Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0">
                    <i class="fas fa-user-plus me-2"></i>Регистрация
                </h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                </div>
                {% endif %}
                
                <form method="POST">
                    <!-- TODO: Добавить CSRF токен после реализации сервиса
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    -->
                    <div class="mb-3">
                        <label for="login" class="form-label">Логин</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" 
                                   class="form-control" 
                                   id="login" 
                                   name="login" 
                                   value="{{ login or '' }}"
                                   placeholder="Введите логин"
                                   required
                                   maxlength="50"
                                   autocomplete="username">
                        </div>
                        <div class="form-text">
                            После регистрации будет автоматически сгенерирован дискриминатор (4 цифры)
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" 
                                   class="form-control" 
                                   id="password" 
                                   name="password" 
                                   placeholder="Введите пароль"
                                   required
                                   minlength="6"
                                   autocomplete="new-password">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">Подтверждение пароля</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" 
                                   class="form-control" 
                                   id="password_confirm" 
                                   name="password_confirm" 
                                   placeholder="Подтвердите пароль"
                                   required
                                   minlength="6"
                                   autocomplete="new-password">
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <small class="text-muted">
                    Уже есть аккаунт? 
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Войдите</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
